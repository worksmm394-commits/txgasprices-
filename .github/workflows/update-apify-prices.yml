name: Daily Apify price refresh

on:
  schedule:
    # Every 3 days at 10:00 UTC (5am Central). Gas prices change 3-4x per
    # week, so a 3-day cadence captures all meaningful moves while keeping
    # monthly Apify cost under ~$20. The hourly AAA state-average refresh
    # runs on its own workflow for the non-Apify fallback cities.
    - cron: '0 10 */3 * *'
  workflow_dispatch: {}

concurrency:
  group: update-apify-prices
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Needed so we can commit the refreshed prices.json back to the repo
      # (the hourly workflow reads it from the committed version).
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch per-city prices from Apify (daily)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: node fetch-apify-prices.js

      - name: Refresh Texas state average from AAA
        env:
          EIA_API_KEY:      ${{ secrets.EIA_API_KEY }}
          GASBUDDY_API_KEY: ${{ secrets.GASBUDDY_API_KEY }}
        run: node fetch-prices.js

      - name: Generate static pages
        run: node generate.js

      - name: Copy car-db.json into output
        run: cp car-db.json output/car-db.json

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy output --project-name=txgasprices

      - name: Commit refreshed prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices.json
          if git diff --quiet --cached; then
            echo "No changes in prices.json — skipping commit."
          else
            git commit -m "chore: daily Apify price refresh [skip ci]"
            git push
          fi
